name: DrumLessonOS
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    macOS: "15.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
settings:
  base:
    SWIFT_VERSION: 6.2
    MACOSX_DEPLOYMENT_TARGET: 15.0
targets:
  DrumLessonOS:
    type: application
    platform: macOS
    sources:
      - path: DrumLessonOS
    resources:
      - path: DrumLessonOS/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: DrumLessonOS/DrumLessonOS.entitlements
    info:
      path: DrumLessonOS/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCalendarsFullAccessUsageDescription: Drum Lesson OS writes scheduled lesson times to the Apple Calendar you choose.
        NSCalendarsUsageDescription: Drum Lesson OS writes scheduled lesson times to the Apple Calendar you choose.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericshim.DrumLessonOS
        PRODUCT_NAME: DrumLessonOS
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
  DrumLessonOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DrumLessonOSTests
    dependencies:
      - target: DrumLessonOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericshim.DrumLessonOSTests
        GENERATE_INFOPLIST_FILE: YES
